<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Pokédex</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark d-flex align-items-center justify-content-center" style="height: 100vh; margin: 0;">
    <div class="card p-4 shadow-lg" style="width: 380px; border-radius: 12px; background-color: #ffffff;">
        <h2 class="text-center text-danger mb-4" style="font-weight: 700;">Pokédex Login</h2>
        
        {% if form.errors %}
            <div class="alert alert-danger p-2 small text-center">
                Usuario o contraseña incorrectos.
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label font-weight-bold" style="font-weight: 600;">Usuario</label>
                <input type="text" name="username" class="form-control" required placeholder="Ingresa tu usuario">
            </div>
            <div class="mb-3">
                <label class="form-label font-weight-bold" style="font-weight: 600;">Contraseña</label>
                <input type="password" name="password" class="form-control" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-danger w-100 mt-3 py-2 font-weight-bold" style="font-weight: 600;">
                Ingresar al Sistema
            </button>
        </form>
    </div>
</body>
</html>
