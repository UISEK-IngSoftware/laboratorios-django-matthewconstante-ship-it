{% extends "base.html" %}
{% block title %} Formulario de Pokemones {% endblock title %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow rounded-4 p-4">
            <h2 class="text-center mb-4">Registrar Pokémon</h2>
            
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                
                <div class="mb-3">
                    {{ form.as_p }}
                </div>
                
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary rounded-pill fw-bold">
                        Guardar Pokémon
                    </button>
                    <a href="{% url 'pokedex:index' %}" class="btn btn-outline-secondary rounded-pill">
                        Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock content %}
