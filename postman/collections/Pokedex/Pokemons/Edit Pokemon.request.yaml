$kind: http-request
name: Edit Pokemon
url: "{{host_url}}"
method: PUT
body:
  type: json
  content: |-
    {
        "name": "Ditto",
        "type": "agua",
        "weight": 1,
        "height": 3,
        "trainer": 1,
        "picture": "data:image/png;base64,"
    }
auth:
  type: bearer
  credentials:
    token: "{{token}}"
order: 3000
