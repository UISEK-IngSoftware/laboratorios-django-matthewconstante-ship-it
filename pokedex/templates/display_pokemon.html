<html>
    <head>
        <title>Pokedex</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    </head>
    <body>
        <div class="container">
            <div class="bg-primary text-white p-4 text-center">
                <h1>Mi Pokedex</h1>
            </div>
            <p>Has elegido el pokemon: <strong>{{ pokemon | capfirst }}</strong></p>
            <h3> Detalles del pokemon</h3>
            <ul class= "list-group">
                <li clas "list-group-item">
                    <strong>Name:</strong> {{ pokemon | capfirst }}
                </li>
                <li clas "list-group-item">
                    <strong>Type:</strong> {{ pokemon.type | capfirst }}
                    </li>
                <li clas "list-group-item">
                    <strong>Heiht:</strong> {{ pokemon.height | capfirst }}
                    <li clas "list-group-item">
                    <strong>Weight:</strong> {{ pokemon.weight | capfirst }}
                    </li>
        </div>
    </body>
</html>
